<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>T-Rex Game</title>
        <script src="script.js" defer></script>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
        <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="hud">
      <span class="hud__label">SCORE</span>
      <span class="hud__value" id="score">00000</span>

      <span class="hud__label hud__label--right">BEST</span>
      <span class="hud__value hud__value--right" id="high-score">00000</span>
    </div>

    <div class="game" id="game">

        <div class="clouds" id="clouds">
        </div>

        <div class="ground" id="ground">
        </div>

        <div class="trex trex--run-a" id="trex" aria-label="T-Rex character">
            <div class="trex__body">
                <div class="trex__head">
                    <div class="trex__eye"></div>
                    <div class="trex__mouth"></div>
                </div>
                <div class="trex__arm"></div>
                <div class="trex__tail"></div>
            </div>
            <div class="trex__legs">
                <div class="trex__leg trex__leg--front"></div>
                <div class="trex__leg trex__leg--back"></div>
            </div>
        </div>

        <div class="obstacles" id="obstacles"></div>

        <div class="overlay overlay--start" id="overlay-start">
            <p class="overlay__eyebrow">press <kbd>SPACE</kbd> to begin</p>
            <h1 class="overlay__title">T-REX<br/>JUMP</h1>
            <p class="overlay__hint">↑ SPACE or TAP to jump</p>
        </div>

        <div class="overlay overlay--gameover" id="overlay-gameover">
            <p class="overlay__eyebrow">game over</p>
            <p class="overlay__final-score">
            score: <span id="final-score">00000</span>
            </p>
            <p class="overlay__hint">press <kbd>SPACE</kbd> or tap to restart</p>
        </div>
    </div>

</body>
</html>
